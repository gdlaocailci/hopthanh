<script>
let mbcMo = false; let cotETonTai = false; let giaTriCotE = ""; let dsGiaoVien = [];
let trangThaiKhoa = "Mở";
/* ==========================================================================
   [NÂNG CẤP] THUẬT TOÁN AUTO-COLLAPSE (TỰ ĐỘNG THU GỌN TEXT CHO Ô ĐIỂM)
   ========================================================================== */
function moRongHienThiDiem(sel) {
    if (sel.hasAttribute('data-dang-thu-gon')) {
        Array.from(sel.options).forEach(opt => {
            let full = opt.getAttribute('data-full');
            if (full) opt.text = full;
        });
        sel.removeAttribute('data-dang-thu-gon');
    }
}

function thuGonHienThiDiem(sel) {
    // Luôn khôi phục lại toàn bộ option thành text đầy đủ trước để bảo toàn chữ trong danh sách
    Array.from(sel.options).forEach(opt => {
        let full = opt.getAttribute('data-full');
        if (full) opt.text = full;
    });
    
    // Chỉ thu gọn text hiển thị ở bề mặt của lựa chọn hiện tại
    if (sel.selectedIndex > 0) { 
        let opt = sel.options[sel.selectedIndex];
        let short = opt.getAttribute('data-short');
        if (short) opt.text = short;
        sel.setAttribute('data-dang-thu-gon', 'true');
    } else {
        sel.removeAttribute('data-dang-thu-gon');
    }
}

function kiemTraLaBGH() {
    if (typeof window.PGV_QUYEN !== 'undefined' && (window.PGV_QUYEN === 'xxx' || window.PGV_QUYEN === 'xx')) return true;
    if (typeof canbHientai !== 'undefined' && (canbHientai.quyen === 'xxx' || canbHientai.quyen === 'xx')) return true;
    return false;
}

function kiemTraQuyenTruyCap() {
    var selectGv = document.getElementById("hopChonGv"); 
    var nutLuu = document.getElementById("nutLuuTam"); 
    var nutNop = document.getElementById("nutNopBcao");
    var diemThuong = document.getElementById("nhapDiemThuong");
    var isBGH = kiemTraLaBGH();
    var isGS = kiemTraLaGS();

    if (cotETonTai && selectGv && selectGv.style.display !== "none") {
        var daChon = selectGv.value && selectGv.value !== "";
        if (daChon) { 
            if (isBGH) {
                if (nutLuu) nutLuu.disabled = false; 
                if (diemThuong) diemThuong.disabled = false;
                if (nutNop) nutNop.disabled = true; 
            } else if (isGS) {
                if (nutLuu) nutLuu.disabled = true; 
                if (nutNop) nutNop.disabled = true; 
                if (diemThuong) diemThuong.disabled = true;
                if (typeof hienThongb === 'function') hienThongb('chuy', '⚠️ Chế độ Giám sát: Đồng chí chỉ có quyền xem, không có quyền chỉnh sửa hồ sơ cán bộ khác.'); 
            } else {
                if (nutLuu) nutLuu.disabled = true; 
                if (nutNop) nutNop.disabled = true; 
                if (diemThuong) diemThuong.disabled = true;
                /* [ĐÃ FIX] Thay đổi từ vựng bao quát */
                if (typeof hienThongb === 'function') hienThongb('chuy', '⚠️ Bạn đang xem nhật ký của nhân sự khác. Chỉ nhân sự đó hoặc Ban Giám hiệu mới được lưu.'); 
            }
        } else { 
            if (nutLuu) nutLuu.disabled = false; 
            if (nutNop && mbcMo) nutNop.disabled = false; 
            if (diemThuong) diemThuong.disabled = false;
        }
    } else { 
        if (window.PGV_IS_SELF || isBGH) { 
            if (nutLuu) nutLuu.disabled = false; 
            if (nutNop && mbcMo) nutNop.disabled = false; 
            if (diemThuong) diemThuong.disabled = false;
        } 
    }

    if (trangThaiKhoa === "Khóa" && diemThuong) {
        diemThuong.disabled = true;
    }
}

function khoiTaoDropdownGiaoVien(danhSachGiaoVien) {
    var selectGv = document.getElementById("hopChonGv"); if (!selectGv) return;
    selectGv.innerHTML = '<option value="">-- Lựa chọn hồ sơ --</option>';
    
    var ds = danhSachGiaoVien;
    if (ds && !Array.isArray(ds) && ds.dliu) {
        ds = ds.dliu;
    }
  if (ds && ds.length > 0) { 
        /* [NÂNG CẤP] Phân nhóm chức vụ Quản lý, Giáo viên, Nhân viên */
        var nhomQL = document.createElement("optgroup"); nhomQL.label = "Ban Quản lý";
        var nhomGV = document.createElement("optgroup"); nhomGV.label = "Giáo viên";
        var nhomNV = document.createElement("optgroup"); nhomNV.label = "Nhân viên";
        var nhomKhac = document.createElement("optgroup"); nhomKhac.label = "Khác";

        ds.forEach(function(cb) { 
            var option = document.createElement("option"); 
            option.value = cb.id || cb.ma || cb.ttrg; 
            option.textContent = cb.ten || cb.hoTen || cb.tenn; 
            
            var cv = String(cb.chucvu || "").toLowerCase().trim();
            if (cv === "ql" || cv.includes("quản lý") || cv.includes("quan ly") || cv.includes("hiệu trưởng") || cv.includes("ht")) {
                nhomQL.appendChild(option);
            } else if (cv === "nv" || cv.includes("nhân viên") || cv.includes("nhan vien")) {
                nhomNV.appendChild(option);
            } else if (cv === "gv" || cv.includes("giáo viên") || cv.includes("giao vien")) {
                nhomGV.appendChild(option);
            } else {
                nhomKhac.appendChild(option);
            }
        }); 

        if (nhomQL.children.length > 0) selectGv.appendChild(nhomQL);
        if (nhomGV.children.length > 0) selectGv.appendChild(nhomGV);
        if (nhomNV.children.length > 0) selectGv.appendChild(nhomNV);
        if (nhomKhac.children.length > 0) selectGv.appendChild(nhomKhac);

        selectGv.style.setProperty('display', 'inline-block', 'important');
        selectGv.disabled = false; 
    } 
    else { 
        selectGv.style.setProperty('display', 'none', 'important'); 
        selectGv.disabled = true; 
    }
}

function xuLyCotE(giaTriE, danhSachGiaoVien) { 
    cotETonTai = true; giaTriCotE = giaTriE; dsGiaoVien = danhSachGiaoVien || []; 
    khoiTaoDropdownGiaoVien(dsGiaoVien); 
    kiemTraQuyenTruyCap(); 
}

function cdang(ptu) { 
    if(!ptu) return;
    ptu.style.height = 'auto'; 
    ptu.style.height = (ptu.scrollHeight) + 'px'; 
}
function gdang(ptu) { ptu.style.height = 'auto'; ptu.style.height = ptu.scrollHeight + 'px'; }
function cgon(ptu, ccao) { ptu.style.height = ccao; ptu.scrollTop = 0; }
function maHoaBcao(chu, tepdk) { let q = (chu || "").trim(); if (tepdk && tepdk.length > 0) { tepdk.forEach(t => { q += ` [FILE:${t.tentep}|${t.duongd}]`; }); } return q; }

function thietLapNutKhoa(trangThai, ngayKhoa = "") {
    let ttKhoa = String(trangThai || "Mở").trim();
    trangThaiKhoa = ttKhoa;
    
    let isBGH = kiemTraLaBGH();
    let btnAll = document.getElementById("nutKhoaTatCa");
    let btn = document.getElementById("nutMoKhoa");
    let spanNgay = document.getElementById("hienThiNgayKhoa"); 
    
    if(btnAll) {
        if(isBGH) {
            btnAll.style.setProperty('display', 'inline-block', 'important');
            if (ttKhoa === "Khóa") {
                btnAll.setAttribute("data-tt", "Mở");
                btnAll.className = "btn btn-sm btn-outline-success fw-bold me-3 align-middle btn-reactbits-shiny";
                btnAll.innerHTML = `<i class="bi bi-unlock-fill me-1"></i> Mở tất cả`;
            } else {
                btnAll.setAttribute("data-tt", "Khóa");
                btnAll.className = "btn btn-sm btn-outline-danger fw-bold me-3 align-middle btn-reactbits-shiny";
                btnAll.innerHTML = `<i class="bi bi-lock-fill me-1"></i> Khóa tất cả`;
            }
        } else {
            btnAll.style.setProperty('display', 'none', 'important');
        }
    }

    if (btn) {
        if (isBGH) {
            btn.style.setProperty('display', 'inline-flex', 'important');
        } else {
            btn.style.setProperty('display', 'none', 'important');
        }
        
        if (ttKhoa === "Khóa") {
            btn.className = "btn btn-success btn-sm fw-bold text-nowrap w-auto d-inline-flex align-items-center btn-reactbits-shiny";
            btn.innerHTML = `<i class="bi bi-unlock-fill me-1"></i> Mở`;
            if (spanNgay) {
                spanNgay.style.setProperty('display', 'inline-flex', 'important');
                spanNgay.innerText = ngayKhoa ? "Đã khoá: " + ngayKhoa : "Đã khoá";
            }
        } else {
            btn.className = "btn btn-danger btn-sm fw-bold text-nowrap w-auto d-inline-flex align-items-center btn-reactbits-shiny";
            btn.innerHTML = `<i class="bi bi-lock-fill me-1"></i> Khóa`;
            if (spanNgay) {
                spanNgay.style.setProperty('display', 'none', 'important');
                spanNgay.innerText = "";
            }
        }
    }
    
    apDungKhoaGiaoDien();
}

function doiTrangThaiKhoa() {
    if (!kiemTraLaBGH()) {
        if (typeof hienThongb === 'function') hienThongb('loi', "⚠️ Đồng chí không có thẩm quyền thao tác nút chức năng này.");
        return;
    }
    
    let maTrangDich = (typeof canbHientai !== 'undefined' && canbHientai && canbHientai.canb) ? canbHientai.canb.ttrg : "";
    if (cotETonTai) { 
        var selectGv = document.getElementById("hopChonGv"); 
        if (selectGv && selectGv.style.display !== "none" && selectGv.value && selectGv.value !== "") { 
            maTrangDich = selectGv.value;
        } 
    }

    if (!maTrangDich || maTrangDich.trim() === "") {
        if (typeof hienThongb === 'function') hienThongb('loi', "⚠️ Không xác định được hồ sơ để khóa/mở.");
        return;
    }

    let trangThaiMoi = (trangThaiKhoa === "Khóa") ? "Mở" : "Khóa";
    
    let hnay = new Date();
    let chuoiNgay = ("0" + hnay.getDate()).slice(-2) + "/" + ("0" + (hnay.getMonth() + 1)).slice(-2) + "/" + hnay.getFullYear();
    let ngayGui = (trangThaiMoi === "Khóa") ? chuoiNgay : "";
    
    let btn = document.getElementById("nutMoKhoa");
    if (btn) btn.disabled = true;
    hienTaiDl("⏳ Đang đồng bộ trạng thái khóa...");

    if (typeof khachApi !== 'undefined' && typeof khachApi.goiThuCong === 'function') {
        khachApi.goiThuCong({
            hdong: "luutrangthaikhoa",
            ttrg: maTrangDich,
            khoa: trangThaiMoi,
            ngayKhoa: ngayGui 
        }, function(kq) {
            anTaiDl();
            if (btn) btn.disabled = false;
            if (kq && kq.ttai === 'tcong') {
                thietLapNutKhoa(trangThaiMoi, ngayGui); 
                if (typeof hienThongb === 'function') hienThongb('tcong', "Đã đồng bộ trạng thái " + trangThaiMoi + " thành công!");
            } else {

    const showDeleteBtn = window.PGV_CAN_SHOW_DELETE_BUTTON === true;
    db.forEach((dong, chs) => {
        let sn = (dong[0] !== null && dong[0] !== undefined && dong[0] !== "") ? dong[0] : "";
        let ndc = dong[1] || ""; let dMax = dong[2] || ""; 
        
        let tGiao = (dong[3] !== undefined && dong[3] !== null) ? String(dong[3]) : "";
        let tHt   = (dong[5] !== undefined && dong[5] !== null) ? String(dong[5]) : "";
        
        let lTdo = dong[4] || ""; 
        let nTH = dong[6] || ""; 
        let rawH = dong[7] || ""; 
        let gc = dong[8] || "";
        
        let j_val = dong[9] || ""; let k_val = dong[10] || ""; let l_val = dong[11] || ""; let m_val = dong[12] || "";
        
        let valChon = ""; let valConfig = rawH;
        if(rawH.includes("@@@")) { let p = rawH.split("@@@"); valChon = p[0]; valConfig = p[1]; } 
        else if(!rawH.includes("|") && !rawH.includes(";") && !rawH.includes("\n") && rawH !== "") { valChon = rawH; valConfig = rawH; }
        
        let safeConfig = valConfig.replace(/"/g, '&quot;');

        let isTitle = ndc.trim().startsWith('*');
        let dsp = isTitle ? 'display: none;' : '';
        let fw = isTitle ? 'fw-bold text-primary text-uppercase' : '';
        let colSp = isTitle ? 'colspan="7"' : '';

        let vTgGiao = (tGiao.toLowerCase() === "dd/mm/yyyy") ? "" : tGiao;
        let vTgHt   = (tHt.toLowerCase() === "dd/mm/yyyy") ? "" : tHt;

        let htmlDiem = `<input type="text" class="form-control form-control-sm text-center fw-bold chonKq" data-config="${safeConfig}" value="${valChon}" style="color:red; ${dsp}" onchange="tinhtTdong()">`;
        
        if (valConfig.includes("|") || valConfig.includes(";") || valConfig.includes("\n")) {
            let optsArray = [];
            if (valConfig.includes(";")) {
                optsArray = valConfig.split(";");
            } else if (valConfig.includes("\n")) {
                let lines = valConfig.split("\n");
                let currentOpt = "";
                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].trim();
                    if (line === "") continue; 
                    currentOpt = currentOpt === "" ? line : currentOpt + " " + line;
                    if (line.includes("|") || i === lines.length - 1) {
                        optsArray.push(currentOpt);
                        currentOpt = "";
                    }
                }
            } else {
                /* [ĐÃ FIX LỖI] Đổi dấu phẩy "," thành dấu gạch đứng "|" */
                optsArray = valConfig.split("|");
            }

            let mangGiaTriDiem = [];
            optsArray.forEach(opt => {
                /* [ĐÃ FIX] Xử lý an toàn tránh lỗi Key-Value */
                let kv = opt.includes("|") ? opt.split("|") : [opt]; 
                let txt = kv[0].replace(/[\r\n]+/g, ' ').replace(/\s+/g, ' ').trim(); 
                let val = kv.length > 1 ? kv[1].replace(/[\r\n]+/g, '').trim() : txt;
                if(txt !== "") {
                    let matchNum = txt.match(/[-+]?\d*\.?\d+/);
                    if (matchNum && kv.length === 1) { val = matchNum[0]; }
                    mangGiaTriDiem.push(val);
                }

                }

        }

        let nutx = showDeleteBtn ? `<button class="btn btn-sm btn-danger py-0 px-2" onclick="xoaDongNv(this)">✕</button>` : ``;
        let dg = `<tr class="dongNv">

          <td ${colSp}>
              <textarea class="form-control nhapNdung ${fw}" readonly rows="1" oninput="cdang(this)" onfocus="cdang(this)">${ndc}</textarea>
              <input type="hidden" class="anNguoiTH" value="${nTH}">
              <input type="hidden" class="anGhiChu" value="${gc}">
              <input type="hidden" class="oColJ" value="${j_val}">
              <input type="hidden" class="oColK" value="${k_val}">
              <input type="hidden" class="oColL" value="${l_val}">
              <input type="hidden" class="oColM" value="${m_val}">
           </td>

          <td class="align-middle" style="${dsp}"><input type="text" class="form-control form-control-sm text-center nhapTgGiao" placeholder="dd/mm/yyyy" value="${vTgGiao}" readonly></td>
          <td class="align-middle" style="${dsp}"><input type="text" class="form-control form-control-sm text-center nhapTdo" value="${lTdo}" readonly></td>

function moDanhSachDiem(suKien, ptu) {
    if (typeof trangThaiKhoa !== 'undefined' && trangThaiKhoa === "Khóa") return;
    
    // Đóng tất cả các danh sách khác đang mở trên màn hình để tránh chồng chéo
    document.querySelectorAll('.khung-danh-sach').forEach(ds => {
        if (ds !== ptu.closest('.vung-chon-diem').querySelector('.khung-danh-sach')) {
            ds.style.display = 'none';
        }
    });
    
    let vungChon = ptu.closest('.vung-chon-diem');
    let danhSach = vungChon.querySelector('.khung-danh-sach');
    
    if (danhSach.style.display === 'none' || danhSach.style.display === '') {
        // 1. Tạm thời hiển thị (nhưng làm trong suốt) để trình duyệt tính toán kích thước thực
        danhSach.style.visibility = 'hidden';
        danhSach.style.display = 'block';
        
        // 2. Lấy tọa độ của nút bấm, chiều cao danh sách và khung cuộn chứa bảng
        let toaDoNut = ptu.getBoundingClientRect();
        let chieuCaoDanhSach = danhSach.getBoundingClientRect().height;
        let vungCuonBang = ptu.closest('.table-responsive');
        let khoangTrongBenDuoi = 0;
        
        // 3. Tính toán chính xác khoảng trống còn lại ở phía dưới
        if (vungCuonBang) {
            let toaDoVungCuon = vungCuonBang.getBoundingClientRect();
            khoangTrongBenDuoi = toaDoVungCuon.bottom - toaDoNut.bottom;
        } else {
            khoangTrongBenDuoi = window.innerHeight - toaDoNut.bottom;
        }
        
        // 4. Thuật toán đảo chiều: Nếu dưới thiếu chỗ VÀ trên đủ chỗ
        if (khoangTrongBenDuoi < (chieuCaoDanhSach + 10) && toaDoNut.top > chieuCaoDanhSach) {
            // Lật danh sách nảy lên trên
            danhSach.style.top = 'auto';
            danhSach.style.bottom = '100%';
            danhSach.style.boxShadow = '0 -4px 8px rgba(0,0,0,0.15)'; // Đảo chiều bóng đổ
        } else {
            // Thả danh sách xuống dưới (mặc định cho các dòng ở trên cùng/giữa)
            danhSach.style.top = '100%';
            danhSach.style.bottom = 'auto';
            danhSach.style.boxShadow = '0 4px 8px rgba(0,0,0,0.15)';
        }
        
        // 5. Bật hiển thị chính thức
        danhSach.style.visibility = 'visible';
    } else {
        danhSach.style.display = 'none';
    }
    
    // Ngăn chặn sự kiện click lan truyền ra bên ngoài
    suKien.stopPropagation(); 
}

function kiemTraTatCaRangBuoc(giaTriThuc, chuoiDieuKien) {
    if (!chuoiDieuKien || chuoiDieuKien.trim() === "") return false;
    let str = chuoiDieuKien.trim();
    let constraints = [];
    if (str.includes(',')) constraints = str.split(',').map(s=>s.trim()).filter(s=>s);
    else if (str.includes(' ')) constraints = str.split(/\s+/).filter(s=>s);
    else constraints = [str];
    if (constraints.length === 0) return false;
    let numVal = parseFloat(String(giaTriThuc).replace(/[^\d.-]/g, ''));
    if (isNaN(numVal)) return false;
    for (let cond of constraints) {
        if (cond.startsWith(">=")) {
            let threshold = parseFloat(cond.substring(2).replace(/[^\d.-]/g, ''));
            if (isNaN(threshold)) return false;
            if (!(numVal >= threshold)) return false;
        } else if (cond.startsWith("<=")) {
            let threshold = parseFloat(cond.substring(2).replace(/[^\d.-]/g, ''));
            if (isNaN(threshold)) return false;
            if (!(numVal <= threshold)) return false;
        } else if (cond.startsWith(">") && !cond.startsWith(">=")) {
            let threshold = parseFloat(cond.substring(1).replace(/[^\d.-]/g, ''));
            if (isNaN(threshold)) return false;
            if (!(numVal > threshold)) return false;
        } else if (cond.startsWith("<") && !cond.startsWith("<=")) {
            let threshold = parseFloat(cond.substring(1).replace(/[^\d.-]/g, ''));
            if (isNaN(threshold)) return false;
            if (!(numVal < threshold)) return false;
        } else {
            let exact = parseFloat(cond.replace(/[^\d.-]/g, ''));
            if (isNaN(exact)) return false;
            if (Math.abs(numVal - exact) > 1e-9) return false;
        }
    }
    return true;
}

function tinhtTdong() {
    const dtc = document.getElementById('nhapDiemThuong'); 
    let dc = dtc ? (parseFloat(dtc.value) || 0) : 0;
    if(dtc) { 
        dtc.classList.remove('diemCong', 'diemTru', 'diemKhong'); 
        if (dc > 0) dtc.classList.add('diemCong'); 
        else if (dc < 0) dtc.classList.add('diemTru'); 
        else dtc.classList.add('diemKhong'); 
    }
    
    let tongDiem = 0;
    let tongMax = 0;
    let soNhiemVu = 0;
    let soDaDanhGia = 0;
    let minRank = 5;
    let hasJMLogic = false;

    document.querySelectorAll('#bangNviec tbody tr.dongNv').forEach((dg) => {
        const cg = dg.querySelector('.chonKq');
        if (cg && cg.style.display !== 'none') {
            soNhiemVu++;
            const maxInp = dg.querySelector('.nhapDiemMax');
            if(maxInp && maxInp.value) {
                let mVal = parseFloat(maxInp.value);
                if(!isNaN(mVal)) tongMax += mVal;
            }
            if (cg.value !== "") {
                soDaDanhGia++;
                let valThuc = cg.value.trim();
                let txtHienThi = valThuc;
                if (cg.tagName === "SELECT") {
                    let selOpt = cg.options[cg.selectedIndex];
                    if (selOpt) txtHienThi = selOpt.text;
                }
                let diem = parseFloat(valThuc);
                if (!isNaN(diem)) tongDiem += diem;
                
                let j = dg.querySelector('.oColJ')?.value.trim() || "";
                let k = dg.querySelector('.oColK')?.value.trim() || "";
                let l = dg.querySelector('.oColL')?.value.trim() || "";
                let m = dg.querySelector('.oColM')?.value.trim() || "";
                
                if (j !== "" || k !== "" || l !== "" || m !== "") {
                    hasJMLogic = true;
                    let rank = 0;
                    if (kiemTraTatCaRangBuoc(valThuc, j)) rank = 4;
                    else if (kiemTraTatCaRangBuoc(valThuc, k)) rank = 3;
                    else if (kiemTraTatCaRangBuoc(valThuc, l)) rank = 2;
                    else if (kiemTraTatCaRangBuoc(valThuc, m)) rank = 1;
                    if (rank > 0) minRank = Math.min(minRank, rank);
                    else minRank = Math.min(minRank, 1);
                }
            }
        }
    });
    
    let diemCuoiCung = tongDiem + dc;
    let xpl = "Chưa hoàn thành";
    
    if (soNhiemVu === 0) {
        xpl = "Chưa giao việc";
    } else if (soDaDanhGia < soNhiemVu) {
        xpl = "Chưa đánh giá";
    } else {
        if (hasJMLogic) {
            if (minRank === 4) xpl = "Xuất sắc";
            else if (minRank === 3) xpl = "Hoàn thành tốt";
            else if (minRank === 2) xpl = "Hoàn thành";
            else if (minRank === 1) xpl = "Chưa hoàn thành";
            else xpl = "Chưa xác định";
        } else {
            let tyLe = tongMax > 0 ? (diemCuoiCung / tongMax) * 100 : diemCuoiCung;
            if (tyLe >= 90) xpl = "Xuất sắc";
            else if (tyLe >= 70) xpl = "Hoàn thành tốt";
            else if (tyLe >= 50) xpl = "Hoàn thành";
            else xpl = "Chưa hoàn thành";
        }
    }
    
    let txtKq = xpl;
    if (soNhiemVu > 0 && soDaDanhGia === soNhiemVu && xpl !== "Chưa giao việc" && xpl !== "Chưa đánh giá") {
        txtKq = `${xpl}: ${diemCuoiCung} điểm`;
    }
    
    const qht = document.getElementById('chuKqHthi');
    if (qht) { 
        qht.innerText = txtKq; 
        qht.className = "fw-bold epMotDong"; 
        if (xpl === "Xuất sắc") qht.classList.add("text-success"); 
        else if (xpl.includes("Hoàn thành")) qht.classList.add("text-primary"); 
        else qht.classList.add("text-danger"); 
    }
    
    const theMenuDoc = document.querySelectorAll('#oKetQuaMenuDoc, .oKetQuaMenuDoc, .ketQuaMenuDoc');
    theMenuDoc.forEach(el => {
        el.innerText = txtKq;
        el.className = "epMotDong"; 
        if (xpl === "Xuất sắc") el.classList.add("text-success", "fw-bold"); 
        else if (xpl.includes("Hoàn thành")) el.classList.add("text-primary", "fw-bold"); 
        else el.classList.add("text-danger", "fw-bold"); 
    });
}

window.tepdinhkBcao = window.tepdinhkBcao || [];

(function() {
    const oBcao = document.getElementById('nhapBcao');
    if (oBcao) {
        const descriptor = Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value');
        if (descriptor) {
            const setGoc = descriptor.set;
            const getGoc = descriptor.get;
            Object.defineProperty(oBcao, 'value', {
                set: function(val) {
                    let chuGoc = String(val || "");
                    window.tepdinhkBcao = [];
                    let chuSach = chuGoc;
                    let regex = /\[FILE:(.*?)\|(.*?)\]/g;
                    let match;
                    while ((match = regex.exec(chuGoc)) !== null) {
                        window.tepdinhkBcao.push({ tentep: match[1].trim(), duongd: match[2].trim() });
                        chuSach = chuSach.replace(match[0], "");
                    }
                    setGoc.call(this, chuSach.trim());
                    if (typeof veDinhKemBcao === 'function') veDinhKemBcao();
                },
                get: function() {
                    return getGoc.call(this);
                }
            });
        }
    }

    if (typeof jQuery !== 'undefined') {
        const originalValHook = $.valHooks.textarea;
        $.valHooks.textarea = {
            set: function(elem, value) {
                if (elem.id === 'nhapBcao') {
                    let chuGoc = String(value || "");
                    window.tepdinhkBcao = [];
                    let chuSach = chuGoc;
                    let regex = /\[FILE:(.*?)\|(.*?)\]/g;
                    let match;
                    while ((match = regex.exec(chuGoc)) !== null) {
                        window.tepdinhkBcao.push({ tentep: match[1].trim(), duongd: match[2].trim() });
                        chuSach = chuSach.replace(match[0], "");
                    }
                    elem.value = chuSach.trim();
                    if (typeof veDinhKemBcao === 'function') veDinhKemBcao();
                    return true; 
                }
                if (originalValHook && originalValHook.set) {
                    return originalValHook.set(elem, value);
                }
                return undefined;
            },
            get: function(elem) {
                if (originalValHook && originalValHook.get) {
                    return originalValHook.get(elem);
                }
                return undefined;
            }
        };

})();

function xulyTaiBcao(ptu) {
    if (typeof trangThaiKhoa !== 'undefined' && trangThaiKhoa === "Khóa") return;
    const files = ptu.files;
    if (!files || files.length === 0) return;
    hienTaiDl("⏳ Đang tải tệp đính kèm lên máy chủ...");
    
    let tepXuLy = 0;
    let mngTep = [];
    let hasError = false;
    
    for (let i = 0; i < files.length; i++) {
        let f = files[i];
        
        if (f.size > 5 * 1024 * 1024) {
            anTaiDl();
            alert("Tệp '" + f.name + "' quá lớn (vượt 5MB). Vui lòng chọn tệp nhỏ hơn.");
            ptu.value = '';
            return;
        }

        let reader = new FileReader();
        reader.onload = function(e) {
            if (hasError) return;
            try {
                let dlBase64 = e.target.result.split(',')[1];
                mngTep.push({ tentep: f.name, kieu: f.type, dliu: dlBase64 });
                tepXuLy++;
                
                if (tepXuLy === files.length) {
                    guiTepLenMayChu(mngTep);
                    ptu.value = ''; 
                }
            } catch (err) {
                hasError = true;
                anTaiDl();
                alert("Lỗi đọc tệp: " + err.message);
                ptu.value = '';
            }
        };
        reader.readAsDataURL(f);
    }
}

function guiTepLenMayChu(mngTep) {
    const xuLyThanhCong = function(kqTho) {
        anTaiDl();
        
        let kq = (typeof kqTho === 'string') ? JSON.parse(kqTho) : kqTho;
        let laThanhCong = (kq.ttai === 'tcong') || Array.isArray(kq);
        
        if (laThanhCong) {
            let duLieuTep = kq.dliu ? kq.dliu : (Array.isArray(kq) ? kq : []);
            
            window.tepdinhkBcao = window.tepdinhkBcao.concat(duLieuTep);
            veDinhKemBcao();
            if (typeof mokBcao === 'function') mokBcao();
            if (typeof hienThongb === 'function') hienThongb('tcong', "Tải tệp thành công!");
        } else {
            let msg = kq.tbao || JSON.stringify(kq);
            if (typeof hienThongb === 'function') hienThongb('loi', "Lỗi tải tệp: " + msg);
        }
    };

    const xuLyLoi = function(loi) {
        anTaiDl();
        if (typeof hienThongb === 'function') hienThongb('loi', "Lỗi kết nối Server: " + (loi.message || loi));
    };

    if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(xuLyThanhCong).withFailureHandler(xuLyLoi).pgv_tai_tepbcao({ teps: mngTep });
    } else if (typeof khachApi !== 'undefined' && khachApi.taiTepBcao) {
        khachApi.taiTepBcao({ teps: mngTep }, xuLyThanhCong, xuLyLoi);
    } else {
        anTaiDl();
        alert("Lỗi hệ thống: API tải tệp chưa được liên kết.");
    }
}

function veDinhKemBcao() {
    const vung = document.getElementById('vungDinhkBcao');
    if (!vung) return;
    vung.innerHTML = '';
    if (!window.tepdinhkBcao || window.tepdinhkBcao.length === 0) return;
    
    window.tepdinhkBcao.forEach((t, i) => {
        let theTep = document.createElement('span');
        theTep.className = "badge bg-light text-dark border d-flex align-items-center mt-1";
        theTep.innerHTML = `<a href="${t.duongd}" target="_blank" class="text-decoration-none text-truncate" style="max-width: 150px; font-size:11px;" title="Tên gốc: ${t.tentep}"><i class="bi bi-paperclip"></i> Báo cáo ${i + 1}</a>
                            <i class="bi bi-x text-danger ms-1" style="cursor:pointer; font-size:16px;" title="Xóa tệp này" onclick="event.stopPropagation(); xoaDinhKemBcao(${i})"></i>`;
        vung.appendChild(theTep);
    });
}

function xoaDinhKemBcao(chs) {
    if (typeof trangThaiKhoa !== 'undefined' && trangThaiKhoa === "Khóa") return;
    if(!confirm("Xác nhận xóa tệp đính kèm này khỏi máy chủ?")) return;
    
    let tepXoa = window.tepdinhkBcao[chs];
    hienTaiDl("🗑️ Đang xóa tệp...");
    
    const xuLyXoaXong = function(kqTho) {
        anTaiDl();
        let kq = epKieuKq(kqTho); 
        if(kq && kq.ttai === 'tcong') {
            window.tepdinhkBcao.splice(chs, 1);
            veDinhKemBcao();
            if (typeof mokBcao === 'function') mokBcao();
            
            xulyLuuTam(true);
            if (typeof hienThongb === 'function') hienThongb('tcong', "Đã xoá tệp và cập nhật nhật ký!");
        } else {
            let msg = kq ? (kq.tbao || JSON.stringify(kq)) : "Lỗi không xác định";
            if (typeof hienThongb === 'function') hienThongb('loi', "Lỗi xóa tệp: " + msg);
        }
    };
    
    const xuLyLoiXoa = function(loi) {
        anTaiDl();
        if (typeof hienThongb === 'function') hienThongb('loi', "Lỗi kết nối Server: " + (loi.message || loi));
    };

    if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(xuLyXoaXong).withFailureHandler(xuLyLoiXoa).pgv_xoa_tepbcao({ duongd: tepXoa.duongd });
    } else if (typeof khachApi !== 'undefined' && khachApi.xoaTepBcao) {
        khachApi.xoaTepBcao({ duongd: tepXoa.duongd }, xuLyXoaXong, xuLyLoiXoa);
    } else {
        anTaiDl();
        alert("Lỗi hệ thống: API xóa tệp chưa được liên kết.");
    }
}
</script>
